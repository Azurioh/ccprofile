name: Code Quality

# Self-contained lint + test on Ubuntu. (The org reusable workflow
# azu-development/ci-templates is private and cross-owner, so it cannot be
# called from this public repo. If ci-templates is made public or granted
# Actions access to this repo, this can be replaced by the org caller.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: node --test
